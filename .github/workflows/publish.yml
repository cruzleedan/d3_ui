name: Publish to pub.dev

# Triggered when a version tag (e.g. v0.1.0) is pushed.
# Uses pub.dev's OIDC-based automated publishing — no tokens or secrets required.
# The package's pub.dev admin page must have automated publishing enabled with
# the tag pattern: v{{version}}
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # stable: v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # pre-release: v1.2.3-beta.1

jobs:
  publish:
    permissions:
      id-token: write   # REQUIRED for pub.dev OIDC authentication
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@main
